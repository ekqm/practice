<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>table</title>
    <style media="screen">
      th,
      td {
        border: 1px solid;
        width: 50px;
        height: 50px;
      }
    </style>
  </head>
  <body bgcolor="">
    <table>
      <caption>
        Monthly Savings
      </caption>
      <thead>
        <tr>
          <th>Month</th>
          <th>Savings</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Jan</td>
          <td rowspan="2">$100</td>
        </tr>
        <tr>
          <td>Feb</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="2">Sum</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
